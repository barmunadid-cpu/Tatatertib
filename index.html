<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hitung Kursi Realtime</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1f1f1f;
color:#fff;
padding:20px;
}

.stage{
width:100%;
max-width:1800px;
margin:0 auto 20px;
background:#444;
padding:15px;
border-radius:10px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.wrap{
display:grid;
grid-template-columns:1fr;
gap:20px;
width:100%;
max-width:1800px;
margin:auto;
}

/* Tablet */
@media (min-width:768px){
.wrap{
grid-template-columns:repeat(2,1fr);
}
}

/* Desktop */
@media (min-width:1200px){
.wrap{
grid-template-columns:repeat(5,1fr);
}
}

.block{
background:#2b2b2b;
padding:15px;
border-radius:10px;
}

.block h2{
text-align:center;
margin-bottom:15px;
}

.seats{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
}

.seat{
padding:14px 0;
border:none;
border-radius:8px;
background:#28a745;
color:white;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.seat:hover{
transform:scale(1.05);
}

.seat.booked{
background:#dc3545;
}

.footer{
position:sticky;
bottom:0;
width:100%;
max-width:1800px;
margin:25px auto 0;
background:#111;
padding:20px;
border-top:1px solid #555;
text-align:center;
border-radius:10px 10px 0 0;
}

.counter{
font-size:22px;
margin-bottom:15px;
}

#reset{
background:#dc3545;
color:white;
border:none;
padding:14px 30px;
border-radius:8px;
cursor:pointer;
font-size:18px;
}
  #settingBtn{

margin-top:15px;

background:#0d6efd;

color:white;

border:none;

padding:12px 25px;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

#settingBtn:hover{

opacity:.9;

}

#settingBox{

background:#222;

padding:15px;

border-radius:10px;

margin-top:15px;

}

#settingBox input{

width:100%;

padding:10px;

border-radius:6px;

border:none;

font-size:16px;

margin-top:5px;

}

#buatDenah{

margin-top:15px;

background:#28a745;

color:white;

border:none;

padding:12px 25px;

border-radius:8px;

cursor:pointer;

font-size:16px;

width:100%;

  }

#reset:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="stage">
PANGGUNG
</div>

<div class="wrap" id="wrap"></div>

<div class="footer">

<div class="counter">
Kursi Terisi :
<b id="jumlah">0</b>
</div>

<button id="reset">
RESET SEMUA
</button>
<br><br>

<button id="settingBtn">
⚙ UBAH DENAH
</button>

<div id="settingBox" style="display:none;margin-top:15px;">

<div style="margin:8px 0;">
Jumlah Blok<br>
<input id="blokInput" type="number" value="2" min="1" max="26">
</div>

<div style="margin:8px 0;">
Jumlah Baris<br>
<input id="barisInput" type="number" value="2" min="1">
</div>

<div style="margin:8px 0;">
Jumlah Kolom<br>
<input id="kolomInput" type="number" value="10" min="1">
</div>

<button id="buatDenah">
SIMPAN DENAH
</button>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,
ref,
set,
onValue,
remove

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyDUBQodoEwmyD3uVFJNJNIByPeWfgkfKXk",

authDomain: "hitung-hadiri-tatatertib.firebaseapp.com",

databaseURL: "https://hitung-hadiri-tatatertib-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "hitung-hadiri-tatatertib",

storageBucket: "hitung-hadiri-tatatertib.firebasestorage.app",

messagingSenderId: "558298621036",

appId: "1:558298621036:web:4f5c4cd051278c8e9de449"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const wrap=document.getElementById("wrap");

const seatMap={};

const blocks=["A","B","C","D","E","F","G","H","I","J"];

const seatPerBlock=80;
blocks.forEach(block=>{

const card=document.createElement("div");
card.className="block";

const title=document.createElement("h2");
title.textContent="BLOK "+block;

const seats=document.createElement("div");
seats.className="seats";

for(let i=1;i<=seatPerBlock;i++){

const kode=block+"-"+String(i).padStart(2,"0");

const btn=document.createElement("button");

btn.className="seat";

btn.textContent=String(i).padStart(2,"0");

seatMap[kode]=btn;

btn.onclick=()=>{

const kursi=ref(db,"kursi/"+kode);

if(btn.classList.contains("booked")){

remove(kursi);

}else{

set(kursi,true);

}

};

seats.appendChild(btn);

}

card.appendChild(title);

card.appendChild(seats);

wrap.appendChild(card);

});

const jumlah=document.getElementById("jumlah");

onValue(ref(db,"kursi"),(snapshot)=>{

const data=snapshot.val()||{};

Object.values(seatMap).forEach(btn=>{

btn.classList.remove("booked");

});

let total=0;

Object.keys(data).forEach(kode=>{

if(seatMap[kode]){

seatMap[kode].classList.add("booked");

total++;

}

});

jumlah.textContent=total;

});
document.getElementById("reset").onclick=()=>{

if(confirm("Reset semua kursi?")){

remove(ref(db,"kursi"));

}

};

</script>

</body>
</html>
