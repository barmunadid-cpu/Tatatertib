<!DOCTYPE html>

<title>Seat Picker</title>

<style>

body{
font-family:Arial;
background:#222;
color:#fff;
margin:0;
padding:20px;
}

.stage{
background:#444;
padding:10px;
text-align:center;
border-radius:8px;
margin:0 auto 20px;
max-width:500px;
}

.wrap{
display:grid;
grid-template-columns:repeat(2,minmax(180px,1fr));
gap:16px;
}

.block{
background:#2d2d2d;
padding:10px;
border-radius:10px;
}

.block h3{
text-align:center;
margin:0 0 8px;
}

.seats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.seat{
background:#28a745;
border:none;
color:white;
padding:10px 0;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.seat.selected{
background:#ffc107;
color:black;
}

.seat.booked{
background:#dc3545;
}

.summary{
position:sticky;
bottom:0;
background:#111;
padding:12px;
margin-top:20px;
border-top:1px solid #555;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

#save{
background:#0d6efd;
color:white;
}

#reset{
background:#dc3545;
color:white;
margin-left:10px;
}

</style>
